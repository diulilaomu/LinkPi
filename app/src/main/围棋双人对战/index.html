<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>围棋 - 双人对战</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app" class="app-container">
        <!-- 头部 -->
        <header class="header">
            <h1>围棋</h1>
            <div class="header-actions">
                <button id="btn-settings" class="icon-btn" title="设置">⚙️</button>
            </div>
        </header>

        <!-- 游戏信息面板 -->
        <div class="info-panel">
            <div class="player-info player-black">
                <div class="player-avatar">⚫</div>
                <div class="player-details">
                    <span class="player-name" id="black-name">黑方</span>
                    <span class="player-captured">提子：<span id="black-captured">0</span></span>
                </div>
                <div class="player-turn-indicator" id="black-turn">⏺</div>
            </div>
            <div class="game-timer">
                <span id="timer">00:00</span>
            </div>
            <div class="player-info player-white">
                <div class="player-avatar">⚪</div>
                <div class="player-details">
                    <span class="player-name" id="white-name">白方</span>
                    <span class="player-captured">提子：<span id="white-captured">0</span></span>
                </div>
                <div class="player-turn-indicator" id="white-turn"></div>
            </div>
        </div>

        <!-- 棋盘容器 -->
        <div class="board-container">
            <canvas id="go-board"></canvas>
        </div>

        <!-- 控制面板 -->
        <div class="control-panel">
            <div class="game-mode-selector">
                <button class="mode-btn active" data-mode="local">本地对战</button>
                <button class="mode-btn" data-mode="online">局域网对战</button>
            </div>
            
            <div class="board-size-selector">
                <button class="size-btn active" data-size="19">19 路</button>
                <button class="size-btn" data-size="13">13 路</button>
                <button class="size-btn" data-size="9">9 路</button>
            </div>

            <div class="action-buttons">
                <button id="btn-new-game" class="action-btn primary">新游戏</button>
                <button id="btn-undo" class="action-btn">悔棋</button>
                <button id="btn-pass" class="action-btn">停一手</button>
                <button id="btn-resign" class="action-btn danger">认输</button>
            </div>

            <div class="game-status" id="game-status">黑方落子</div>
        </div>

        <!-- 网络对战面板（隐藏） -->
        <div id="network-panel" class="network-panel hidden">
            <div class="network-tabs">
                <button class="tab-btn active" data-tab="create">创建房间</button>
                <button class="tab-btn" data-tab="join">加入房间</button>
            </div>
            <div id="create-room-section" class="network-section">
                <input type="text" id="room-name-input" placeholder="房间名称" maxlength="20">
                <select id="room-board-size">
                    <option value="19">19 路棋盘</option>
                    <option value="13">13 路棋盘</option>
                    <option value="9">9 路棋盘</option>
                </select>
                <button id="btn-create-room" class="action-btn primary">创建房间</button>
            </div>
            <div id="join-room-section" class="network-section hidden">
                <input type="text" id="join-room-id" placeholder="房间 ID">
                <button id="btn-join-room" class="action-btn primary">加入房间</button>
            </div>
            <div id="room-list-section" class="network-section hidden">
                <h3>可用房间</h3>
                <div id="room-list"></div>
            </div>
            <div id="online-status" class="online-status">
                <span class="status-dot"></span>
                <span id="status-text">未连接</span>
            </div>
            <button id="btn-close-network" class="action-btn">关闭网络面板</button>
        </div>

        <!-- 设置面板（隐藏） -->
        <div id="settings-panel" class="settings-panel hidden">
            <h2>设置</h2>
            <div class="setting-item">
                <label>黑方名称</label>
                <input type="text" id="setting-black-name" maxlength="10">
            </div>
            <div class="setting-item">
                <label>白方名称</label>
                <input type="text" id="setting-white-name" maxlength="10">
            </div>
            <div class="setting-item">
                <label>音效</label>
                <input type="checkbox" id="setting-sound" checked>
            </div>
            <div class="setting-item">
                <label>振动反馈</label>
                <input type="checkbox" id="setting-vibrate" checked>
            </div>
            <button id="btn-save-settings" class="action-btn primary">保存设置</button>
            <button id="btn-close-settings" class="action-btn">关闭</button>
        </div>

        <!-- 游戏结束弹窗 -->
        <div id="game-over-modal" class="modal hidden">
            <div class="modal-content">
                <h2 id="game-over-title">游戏结束</h2>
                <p id="game-over-message"></p>
                <div class="modal-buttons">
                    <button id="btn-new-game-modal" class="action-btn primary">新游戏</button>
                    <button id="btn-close-modal" class="action-btn">关闭</button>
                </div>
            </div>
        </div>
    </div>

    <script src="storage.js"></script>
    <script src="game.js"></script>
    <script src="network.js"></script>
    <script src="ui.js"></script>
</body>
</html>
