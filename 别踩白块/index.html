<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>别踩白块</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="score-item">
                <div class="score-label">分数</div>
                <div class="score-value" id="score">0</div>
            </div>
            <div class="title">别踩白块</div>
            <div class="score-item">
                <div class="score-label">最高</div>
                <div class="score-value" id="best">0</div>
            </div>
        </header>

        <div class="board-wrapper">
            <div class="board" id="board"></div>
        </div>

        <footer class="footer">
            <button class="btn" id="start-btn">开始游戏</button>
        </footer>

        <!-- 开始遮罩 -->
        <div class="overlay show" id="start-overlay">
            <div class="overlay-box">
                <h1>别踩白块</h1>
                <p>点击黑色方块，不要碰白色！</p>
                <button class="btn" id="play-btn">开始</button>
            </div>
        </div>

        <!-- 结束遮罩 -->
        <div class="overlay" id="over-overlay">
            <div class="overlay-box">
                <h2 class="over-title">游戏结束</h2>
                <p class="over-score">得分：<span id="final-score">0</span></p>
                <p class="over-best">最高分：<span id="final-best">0</span></p>
                <button class="btn" id="restart-btn">再来一局</button>
            </div>
        </div>
    </div>

    <script src="js/game.js"></script>
</body>
</html>
